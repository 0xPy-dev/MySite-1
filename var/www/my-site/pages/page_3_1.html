<!DOCTYPE HTML>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="stylesheet" type="text/css" href="../css/style_3.css">
		<title>Форма авторизации</title>
	</head>
	<body>
		<form class="register_form" action='../actions/action_form_3_1.php' method='post'>
			<div class="uname">
				<p><b>Придумайте имя пользователя:</b></p>
				<input class="uname" type="text" name="uname" placeholder="Имя пользователя"></input>
			</div>
			<div>
				<p><b>Введите email:</b></p>
				<input class="email" type="text" name="email" placeholder="Email"></input>
			</div>
			<div>
				<p><b>Придумайте пароль:</b></p>
				<input class="passwd" type="password" name="passwd" placeholder="Введите пароль">
			</div>
			<div>
				<p><b>Повторите пароль:</b></p>
				<input class="cpasswd" type="password" name="cpasswd" placeholder="Повторите пароль">
			</div>
			<div>
				<p>
					<button class="btn" type="submit">Отправить</button>
					<button class="btn" type="reset" name="reset">Очистить</button>
				</p>
			</div>
		</form>
	</body>
</html>
